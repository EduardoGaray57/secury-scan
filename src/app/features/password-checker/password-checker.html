<div class="checker-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Verificar Contraseña</mat-card-title>
            <mat-card-subtitle>Comprueba si tu contraseña fue filtrada en alguna brecha de datos</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <mat-form-field appearance="outline" style="width: 100%;">
                <mat-label>Contraseña</mat-label>
                <input 
                  matInput
                  [type]="hidePassword ? 'password' : 'text'"
                  [(ngModel)]="password"
                  (ngModelChange)="onPasswordChange($event)"
                  placeholder="Ingresa tu contraseña"                                  
                  />
                  <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword">
                    <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                  </button>
            </mat-form-field>

            @if (password && strength) {
                <div class="strength-container" [@fadeIn]>
                    <div class="strength-bar">
                        <div 
                          class="strength-fill"
                          [style.width.%]="(strength.score / 5) * 100"
                          [style.background-color]="strength.color"
                        ></div>
                    </div>
                    <span class="strength-label" [style.color]="strength.color">
                        {{ strength.label }}
                    </span>
                    <div class="criteria-list">
                        <span [class.met]="strength.criteria.minLength">✓ Mínimo 8 caracteres</span>
                        <span [class.met]="strength.criteria.hasUppercase">✓ Mayúsculas</span>
                        <span [class.met]="strength.criteria.hasLowercase">✓ Minúsculas</span>
                        <span [class.met]="strength.criteria.hasNumbers">✓ Números</span>
                        <span [class.met]="strength.criteria.hasSpecialChars">✓ Caracteres especiales</span>
                    </div>
                </div>
            }
        </mat-card-content>
        <mat-card-actions>
            <button
              mat-raised-button
              color="primary"
              (click)="checkPassword()"
              [disabled]="loading || !password"
            >
            <mat-icon>search</mat-icon>
            {{ loading ? 'Verificando...' : 'Verificar' }}
            </button>
        </mat-card-actions>
    </mat-card>

    @if (result) {
        <app-result-card [@fadeIn] [result] = "result" />
    }
</div>
